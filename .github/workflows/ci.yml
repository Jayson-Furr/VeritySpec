name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Validate example workspace
        run: verity validate examples/basic

      - name: Lint example workspace
        run: verity lint examples/basic --strict

      - name: Check example readiness
        run: verity readiness examples/basic --strict

      - name: Check all example workspaces
        run: |
          for workspace in examples/basic examples/api-service examples/cli-tool examples/events examples/security; do
            verity validate "$workspace"
            verity lint "$workspace" --strict
            verity readiness "$workspace" --strict
          done
          mkdir -p build
          set +e
          verity validate examples/broken --format json > build/broken-validation.json
          exit_status=$?
          set -e
          test "$exit_status" -eq 1
          python -m json.tool build/broken-validation.json >/dev/null

      - name: Check CLI contract
        run: |
          mkdir -p build
          verity --version
          verity pack list --format json > build/packs.json
          verity pack validate --format json > build/pack-validation.json
          verity pack list --path tests/fixtures/custom_pack --format json > build/packs-with-external.json
          verity pack validate verity.pack.features --path tests/fixtures/custom_pack --format json > build/custom-pack-validation.json
          verity validate examples/basic --format json > build/validate.json
          verity lint examples/basic --strict --format json > build/lint.json
          verity readiness examples/basic --strict --format json > build/readiness.json
          verity validate examples/security --format json > build/security-validate.json
          verity lint examples/security --strict --format json > build/security-lint.json
          verity readiness examples/security --strict --format json > build/security-readiness.json
          verity validate tests/fixtures/custom_pack_workspace --format json > build/custom-pack-validate.json
          verity lint tests/fixtures/custom_pack_workspace --strict --format json > build/custom-pack-lint.json
          verity readiness tests/fixtures/custom_pack_workspace --strict --format json > build/custom-pack-readiness.json
          verity doctor examples/basic --format json > build/doctor.json
          verity explain reference.missing --format json > build/explain-reference-missing.json
          verity migrate examples/basic --dry-run --format json > build/migrate.json
          verity graph examples/basic --focus api.users.create --format json > build/graph-focus.json
          verity graph tests/fixtures/broken_semantics --cycles --format json > build/graph-cycles.json
          for template in basic api cli events security; do
            verity init "build/init-$template" --template "$template" --owner platform --force
            verity validate "build/init-$template" --format json > "build/init-$template-validate.json"
            verity lint "build/init-$template" --strict --format json > "build/init-$template-lint.json"
            verity readiness "build/init-$template" --strict --format json > "build/init-$template-readiness.json"
          done
          verity import prismspec tests/fixtures/prismspec_sample --out build/prismspec-import > build/prismspec-import-report.json
          verity validate build/prismspec-import --format json > build/prismspec-import-validation.json
          python -m json.tool build/packs.json >/dev/null
          python -m json.tool build/pack-validation.json >/dev/null
          python -m json.tool build/packs-with-external.json >/dev/null
          python -m json.tool build/custom-pack-validation.json >/dev/null
          python -m json.tool build/validate.json >/dev/null
          python -m json.tool build/lint.json >/dev/null
          python -m json.tool build/readiness.json >/dev/null
          python -m json.tool build/security-validate.json >/dev/null
          python -m json.tool build/security-lint.json >/dev/null
          python -m json.tool build/security-readiness.json >/dev/null
          python -m json.tool build/custom-pack-validate.json >/dev/null
          python -m json.tool build/custom-pack-lint.json >/dev/null
          python -m json.tool build/custom-pack-readiness.json >/dev/null
          python -m json.tool build/doctor.json >/dev/null
          python -m json.tool build/explain-reference-missing.json >/dev/null
          python -m json.tool build/migrate.json >/dev/null
          python -m json.tool build/graph-focus.json >/dev/null
          python -m json.tool build/graph-cycles.json >/dev/null
          for template in basic api cli events security; do
            python -m json.tool "build/init-$template-validate.json" >/dev/null
            python -m json.tool "build/init-$template-lint.json" >/dev/null
            python -m json.tool "build/init-$template-readiness.json" >/dev/null
          done
          python -m json.tool build/prismspec-import-report.json >/dev/null
          python -m json.tool build/prismspec-import/migration-report.json >/dev/null
          python -m json.tool build/prismspec-import-validation.json >/dev/null

      - name: Check generators
        run: |
          verity generate openapi examples/basic --out build/openapi.json
          verity generate asyncapi examples/basic --out build/asyncapi.json
          verity generate typescript examples/basic --out build/types.ts
          verity generate python-models examples/basic --out build/models.py
          verity generate typescript tests/fixtures/generator_maturity --out build/generator-maturity.ts
          verity generate python-models tests/fixtures/generator_maturity --out build/generator-maturity.py
          verity generate schema-bundle examples/basic --out build/schema-bundle.json
          verity generate cli-reference examples/basic --out build/cli-reference.md
          verity generate validation-report examples/basic --out build/validation-report.json
          verity generate security-report examples/security --out build/security-report.json
          verity generate schema-bundle tests/fixtures/custom_pack_workspace --out build/custom-pack-schema-bundle.json
          verity generate openapi examples/api-service --out build/api-service.openapi.json
          verity generate cli-reference examples/cli-tool --out build/cli-tool.reference.md
          verity generate asyncapi examples/events --out build/events.asyncapi.json
          python -m json.tool build/openapi.json >/dev/null
          python -m json.tool build/asyncapi.json >/dev/null
          python -m json.tool build/api-service.openapi.json >/dev/null
          python -m json.tool build/events.asyncapi.json >/dev/null
          python -m json.tool build/schema-bundle.json >/dev/null
          python -m json.tool build/custom-pack-schema-bundle.json >/dev/null
          python -m json.tool build/validation-report.json >/dev/null
          python -m json.tool build/security-report.json >/dev/null
          python -m py_compile build/models.py
          python -m py_compile build/generator-maturity.py

      - name: Check package build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
          python -m venv /tmp/verityspec-wheel
          /tmp/verityspec-wheel/bin/python -m pip install --upgrade pip
          /tmp/verityspec-wheel/bin/pip install dist/*.whl
          /tmp/verityspec-wheel/bin/verity --version
          /tmp/verityspec-wheel/bin/verity pack validate
          /tmp/verityspec-wheel/bin/verity validate examples/basic
