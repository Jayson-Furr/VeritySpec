name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Validate example workspace
        run: verity validate examples/basic

      - name: Lint example workspace
        run: verity lint examples/basic --strict

      - name: Check example readiness
        run: verity readiness examples/basic --strict

      - name: Check all example workspaces
        run: |
          for workspace in examples/basic examples/api-service examples/cli-tool examples/events examples/security examples/observability examples/accessibility examples/compliance examples/deployment examples/game-core examples/game-assets examples/unity examples/godot examples/unreal examples/gameplay examples/content examples/economy examples/progression examples/product-delivery examples/mobile examples/liveops examples/evidence; do
            verity validate "$workspace"
            verity lint "$workspace" --strict
            verity readiness "$workspace" --strict
          done
          mkdir -p build
          set +e
          verity validate examples/broken --format json > build/broken-validation.json
          exit_status=$?
          set -e
          test "$exit_status" -eq 1
          python -m json.tool build/broken-validation.json >/dev/null

      - name: Check CLI contract
        run: |
          mkdir -p build
          verity --version
          verity pack list --format json > build/packs.json
          verity pack validate --format json > build/pack-validation.json
          verity pack list --path tests/fixtures/custom_pack --format json > build/packs-with-external.json
          verity pack validate verity.pack.features --path tests/fixtures/custom_pack --format json > build/custom-pack-validation.json
          verity pack validate verity.pack.features --path docs/fixtures/pack-scaffold/packs/features --format json > build/pack-scaffold-pack-validation.json
          verity validate examples/basic --format json > build/validate.json
          verity lint examples/basic --strict --format json > build/lint.json
          verity readiness examples/basic --strict --format json > build/readiness.json
          verity validate examples/security --format json > build/security-validate.json
          verity lint examples/security --strict --format json > build/security-lint.json
          verity readiness examples/security --strict --format json > build/security-readiness.json
          verity validate examples/accessibility --format json > build/accessibility-validate.json
          verity lint examples/accessibility --strict --format json > build/accessibility-lint.json
          verity readiness examples/accessibility --strict --format json > build/accessibility-readiness.json
          verity validate examples/compliance --format json > build/compliance-validate.json
          verity lint examples/compliance --strict --format json > build/compliance-lint.json
          verity readiness examples/compliance --strict --format json > build/compliance-readiness.json
          verity validate examples/deployment --format json > build/deployment-validate.json
          verity lint examples/deployment --strict --format json > build/deployment-lint.json
          verity readiness examples/deployment --strict --format json > build/deployment-readiness.json
          verity validate examples/game-core --format json > build/game-core-validate.json
          verity lint examples/game-core --strict --format json > build/game-core-lint.json
          verity readiness examples/game-core --strict --format json > build/game-core-readiness.json
          verity validate examples/game-assets --format json > build/game-assets-validate.json
          verity lint examples/game-assets --strict --format json > build/game-assets-lint.json
          verity readiness examples/game-assets --strict --format json > build/game-assets-readiness.json
          verity validate examples/unity --format json > build/unity-validate.json
          verity lint examples/unity --strict --format json > build/unity-lint.json
          verity readiness examples/unity --strict --format json > build/unity-readiness.json
          verity graph examples/unity --format json > build/unity-graph.json
          verity validate examples/godot --format json > build/godot-validate.json
          verity lint examples/godot --strict --format json > build/godot-lint.json
          verity readiness examples/godot --strict --format json > build/godot-readiness.json
          verity graph examples/godot --format json > build/godot-graph.json
          verity validate examples/unreal --format json > build/unreal-validate.json
          verity lint examples/unreal --strict --format json > build/unreal-lint.json
          verity readiness examples/unreal --strict --format json > build/unreal-readiness.json
          verity graph examples/unreal --format json > build/unreal-graph.json
          verity validate examples/gameplay --format json > build/gameplay-validate.json
          verity lint examples/gameplay --strict --format json > build/gameplay-lint.json
          verity readiness examples/gameplay --strict --format json > build/gameplay-readiness.json
          verity validate examples/content --format json > build/content-validate.json
          verity lint examples/content --strict --format json > build/content-lint.json
          verity readiness examples/content --strict --format json > build/content-readiness.json
          verity validate examples/economy --format json > build/economy-validate.json
          verity lint examples/economy --strict --format json > build/economy-lint.json
          verity readiness examples/economy --strict --format json > build/economy-readiness.json
          verity validate examples/progression --format json > build/progression-validate.json
          verity lint examples/progression --strict --format json > build/progression-lint.json
          verity readiness examples/progression --strict --format json > build/progression-readiness.json
          verity graph examples/progression --format json > build/progression-graph.json
          verity validate examples/product-delivery --format json > build/product-delivery-validate.json
          verity lint examples/product-delivery --strict --format json > build/product-delivery-lint.json
          verity readiness examples/product-delivery --strict --format json > build/product-delivery-readiness.json
          verity graph examples/product-delivery --format json > build/product-delivery-graph.json
          verity validate examples/mobile --format json > build/mobile-validate.json
          verity lint examples/mobile --strict --format json > build/mobile-lint.json
          verity readiness examples/mobile --strict --format json > build/mobile-readiness.json
          verity graph examples/mobile --format json > build/mobile-graph.json
          verity validate examples/liveops --format json > build/liveops-validate.json
          verity lint examples/liveops --strict --format json > build/liveops-lint.json
          verity readiness examples/liveops --strict --format json > build/liveops-readiness.json
          verity graph examples/liveops --format json > build/liveops-graph.json
          verity validate examples/evidence --format json > build/evidence-validate.json
          verity lint examples/evidence --strict --format json > build/evidence-lint.json
          verity readiness examples/evidence --strict --format json > build/evidence-readiness.json
          verity graph examples/evidence --format json > build/evidence-graph.json
          verity validate tests/fixtures/custom_pack_workspace --format json > build/custom-pack-validate.json
          verity lint tests/fixtures/custom_pack_workspace --strict --format json > build/custom-pack-lint.json
          verity readiness tests/fixtures/custom_pack_workspace --strict --format json > build/custom-pack-readiness.json
          verity validate docs/fixtures/pack-scaffold/workspace --format json > build/pack-scaffold-validate.json
          verity lint docs/fixtures/pack-scaffold/workspace --strict --format json > build/pack-scaffold-lint.json
          verity readiness docs/fixtures/pack-scaffold/workspace --strict --format json > build/pack-scaffold-readiness.json
          verity validate tests/fixtures/cross_pack_coverage --format json > build/cross-pack-coverage-validate.json
          verity lint tests/fixtures/cross_pack_coverage --strict --format json > build/cross-pack-coverage-lint.json
          verity readiness tests/fixtures/cross_pack_coverage --strict --format json > build/cross-pack-coverage-readiness.json
          verity validate tests/fixtures/product_impact/baseline --format json > build/product-impact-baseline-validate.json
          verity lint tests/fixtures/product_impact/baseline --strict --format json > build/product-impact-baseline-lint.json
          verity readiness tests/fixtures/product_impact/baseline --strict --format json > build/product-impact-baseline-readiness.json
          verity validate tests/fixtures/product_impact/current --format json > build/product-impact-current-validate.json
          verity lint tests/fixtures/product_impact/current --strict --format json > build/product-impact-current-lint.json
          verity readiness tests/fixtures/product_impact/current --strict --format json > build/product-impact-current-readiness.json
          verity doctor examples/basic --format json > build/doctor.json
          verity explain reference.missing --format json > build/explain-reference-missing.json
          verity diff examples/basic examples/basic --format json > build/diff.json
          verity migrate examples/basic --dry-run --format json > build/migrate.json
          verity graph examples/basic --focus api.users.create --format json > build/graph-focus.json
          verity graph tests/fixtures/broken_semantics --cycles --format json > build/graph-cycles.json
          for template in basic api cli events security; do
            verity init "build/init-$template" --template "$template" --owner platform --force
            verity validate "build/init-$template" --format json > "build/init-$template-validate.json"
            verity lint "build/init-$template" --strict --format json > "build/init-$template-lint.json"
            verity readiness "build/init-$template" --strict --format json > "build/init-$template-readiness.json"
          done
          verity import prismspec tests/fixtures/prismspec_sample --out build/prismspec-import > build/prismspec-import-report.json
          verity validate build/prismspec-import --format json > build/prismspec-import-validation.json
          python -m json.tool build/packs.json >/dev/null
          python -m json.tool build/pack-validation.json >/dev/null
          python -m json.tool build/packs-with-external.json >/dev/null
          python -m json.tool build/custom-pack-validation.json >/dev/null
          python -m json.tool build/pack-scaffold-pack-validation.json >/dev/null
          python -m json.tool build/validate.json >/dev/null
          python -m json.tool build/lint.json >/dev/null
          python -m json.tool build/readiness.json >/dev/null
          python -m json.tool build/security-validate.json >/dev/null
          python -m json.tool build/security-lint.json >/dev/null
          python -m json.tool build/security-readiness.json >/dev/null
          python -m json.tool build/accessibility-validate.json >/dev/null
          python -m json.tool build/accessibility-lint.json >/dev/null
          python -m json.tool build/accessibility-readiness.json >/dev/null
          python -m json.tool build/compliance-validate.json >/dev/null
          python -m json.tool build/compliance-lint.json >/dev/null
          python -m json.tool build/compliance-readiness.json >/dev/null
          python -m json.tool build/deployment-validate.json >/dev/null
          python -m json.tool build/deployment-lint.json >/dev/null
          python -m json.tool build/deployment-readiness.json >/dev/null
          python -m json.tool build/game-core-validate.json >/dev/null
          python -m json.tool build/game-core-lint.json >/dev/null
          python -m json.tool build/game-core-readiness.json >/dev/null
          python -m json.tool build/game-assets-validate.json >/dev/null
          python -m json.tool build/game-assets-lint.json >/dev/null
          python -m json.tool build/game-assets-readiness.json >/dev/null
          python -m json.tool build/unity-validate.json >/dev/null
          python -m json.tool build/unity-lint.json >/dev/null
          python -m json.tool build/unity-readiness.json >/dev/null
          python -m json.tool build/unity-graph.json >/dev/null
          python -m json.tool build/godot-validate.json >/dev/null
          python -m json.tool build/godot-lint.json >/dev/null
          python -m json.tool build/godot-readiness.json >/dev/null
          python -m json.tool build/godot-graph.json >/dev/null
          python -m json.tool build/unreal-validate.json >/dev/null
          python -m json.tool build/unreal-lint.json >/dev/null
          python -m json.tool build/unreal-readiness.json >/dev/null
          python -m json.tool build/unreal-graph.json >/dev/null
          python -m json.tool build/gameplay-validate.json >/dev/null
          python -m json.tool build/gameplay-lint.json >/dev/null
          python -m json.tool build/gameplay-readiness.json >/dev/null
          python -m json.tool build/content-validate.json >/dev/null
          python -m json.tool build/content-lint.json >/dev/null
          python -m json.tool build/content-readiness.json >/dev/null
          python -m json.tool build/economy-validate.json >/dev/null
          python -m json.tool build/economy-lint.json >/dev/null
          python -m json.tool build/economy-readiness.json >/dev/null
          python -m json.tool build/progression-validate.json >/dev/null
          python -m json.tool build/progression-lint.json >/dev/null
          python -m json.tool build/progression-readiness.json >/dev/null
          python -m json.tool build/progression-graph.json >/dev/null
          python -m json.tool build/product-delivery-validate.json >/dev/null
          python -m json.tool build/product-delivery-lint.json >/dev/null
          python -m json.tool build/product-delivery-readiness.json >/dev/null
          python -m json.tool build/product-delivery-graph.json >/dev/null
          python -m json.tool build/mobile-validate.json >/dev/null
          python -m json.tool build/mobile-lint.json >/dev/null
          python -m json.tool build/mobile-readiness.json >/dev/null
          python -m json.tool build/mobile-graph.json >/dev/null
          python -m json.tool build/liveops-validate.json >/dev/null
          python -m json.tool build/liveops-lint.json >/dev/null
          python -m json.tool build/liveops-readiness.json >/dev/null
          python -m json.tool build/liveops-graph.json >/dev/null
          python -m json.tool build/evidence-validate.json >/dev/null
          python -m json.tool build/evidence-lint.json >/dev/null
          python -m json.tool build/evidence-readiness.json >/dev/null
          python -m json.tool build/evidence-graph.json >/dev/null
          python -m json.tool build/custom-pack-validate.json >/dev/null
          python -m json.tool build/custom-pack-lint.json >/dev/null
          python -m json.tool build/custom-pack-readiness.json >/dev/null
          python -m json.tool build/pack-scaffold-validate.json >/dev/null
          python -m json.tool build/pack-scaffold-lint.json >/dev/null
          python -m json.tool build/pack-scaffold-readiness.json >/dev/null
          python -m json.tool build/cross-pack-coverage-validate.json >/dev/null
          python -m json.tool build/cross-pack-coverage-lint.json >/dev/null
          python -m json.tool build/cross-pack-coverage-readiness.json >/dev/null
          python -m json.tool build/product-impact-baseline-validate.json >/dev/null
          python -m json.tool build/product-impact-baseline-lint.json >/dev/null
          python -m json.tool build/product-impact-baseline-readiness.json >/dev/null
          python -m json.tool build/product-impact-current-validate.json >/dev/null
          python -m json.tool build/product-impact-current-lint.json >/dev/null
          python -m json.tool build/product-impact-current-readiness.json >/dev/null
          python -m json.tool build/doctor.json >/dev/null
          python -m json.tool build/explain-reference-missing.json >/dev/null
          python -m json.tool build/diff.json >/dev/null
          python -m json.tool build/migrate.json >/dev/null
          python -m json.tool build/graph-focus.json >/dev/null
          python -m json.tool build/graph-cycles.json >/dev/null
          for template in basic api cli events security; do
            python -m json.tool "build/init-$template-validate.json" >/dev/null
            python -m json.tool "build/init-$template-lint.json" >/dev/null
            python -m json.tool "build/init-$template-readiness.json" >/dev/null
          done
          python -m json.tool build/prismspec-import-report.json >/dev/null
          python -m json.tool build/prismspec-import/migration-report.json >/dev/null
          python -m json.tool build/prismspec-import-validation.json >/dev/null

      - name: Check generators
        run: |
          verity generate openapi examples/basic --out build/openapi.json
          verity generate asyncapi examples/basic --out build/asyncapi.json
          verity generate typescript examples/basic --out build/types.ts
          verity generate python-models examples/basic --out build/models.py
          verity generate typescript tests/fixtures/generator_maturity --out build/generator-maturity.ts
          verity generate python-models tests/fixtures/generator_maturity --out build/generator-maturity.py
          verity generate schema-bundle examples/basic --out build/schema-bundle.json
          verity generate cli-reference examples/basic --out build/cli-reference.md
          verity generate validation-report examples/basic --out build/validation-report.json
          verity generate security-report examples/security --out build/security-report.json
          verity generate security-report examples/security --format markdown --out build/security-report.md
          verity generate observability-report examples/observability --out build/observability-report.json
          verity generate accessibility-report examples/accessibility --out build/accessibility-report.json
          verity generate compliance-matrix examples/compliance --out build/compliance-matrix.json
          verity generate deployment-report examples/deployment --out build/deployment-report.json
          verity generate evidence-report examples/evidence --out build/evidence-report.json
          verity generate coverage-dashboard tests/fixtures/cross_pack_coverage --out build/coverage-dashboard.json
          verity generate pack-capability-index tests/fixtures/custom_pack_workspace --out build/pack-capability-index.json
          verity generate schema-bundle docs/fixtures/pack-scaffold/workspace --out build/pack-scaffold-schema-bundle.json
          verity generate pack-capability-index docs/fixtures/pack-scaffold/workspace --out build/pack-scaffold-capability-index.json
          verity generate product-impact tests/fixtures/product_impact/baseline tests/fixtures/product_impact/current --out build/product-impact.json
          verity generate schema-bundle tests/fixtures/custom_pack_workspace --out build/custom-pack-schema-bundle.json
          verity generate schema-bundle examples/observability --out build/observability-schema-bundle.json
          verity generate schema-bundle examples/accessibility --out build/accessibility-schema-bundle.json
