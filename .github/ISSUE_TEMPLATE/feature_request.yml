name: Feature request
description: Propose a pack, generator, validation rule, or workflow.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What product-contract behavior should VeritySpec support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the command, pack, schema, readiness gate, or generator.
    validations:
      required: true

