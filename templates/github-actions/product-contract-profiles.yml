name: Product Contract Profiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verity:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            workspace: specs/release
            profile: release
            strict: true
          - name: regulated
            workspace: specs/regulated
            profile: regulated
            strict: true
          - name: public-api
            workspace: specs/public-api
            profile: public-api
            strict: true
          - name: internal-tool
            workspace: specs/internal-tool
            profile: internal-tool
            strict: false
    uses: Jason-Furr/verity-spec/.github/workflows/product-contract.yml@v0.59.0
    with:
      workspace: ${{ matrix.workspace }}
      profile: ${{ matrix.profile }}
      strict: ${{ matrix.strict }}
